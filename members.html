<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cCc League One SK6 - Members</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="config.js"></script>
  <script src="site-config.js"></script>
  <script src="portal-shim.js"></script>
  <style>
    :root {
      --primary: #5b3a8f;
      --primary-hover: #4a2d7a;
      --accent: #c8a415;
      --accent-light: #e6d06c;
      --bg-dark: #f5f0e4;
      --bg-card: rgba(255, 252, 245, 0.97);
      --text: #2d2418;
      --text-muted: #6b5d4e;
      --success: #7b52ab;
      --danger: #c0392b;
      --border: #d4c9b5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e8dfd0 0%, #f5f0e4 100%);
      color: var(--text); min-height: 100vh;
      background-attachment: fixed; padding: 60px 8px 80px 8px;
    }
    .tab-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: center; gap: 0;
      background: #fffcf5; border-bottom: 2px solid var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 0;
    }
    .tab-nav a {
      color: var(--text-muted); text-decoration: none;
      padding: 12px 18px; font-size: 0.95em; font-weight: 500;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .tab-nav a:hover { color: var(--primary); }
    .tab-nav a.active { color: var(--primary); border-bottom-color: var(--primary); }
    .nav-icon { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; }
    .login-bar {
      position: fixed; top: 0; right: 8px; z-index: 1001;
      display: flex; align-items: center; gap: 8px; padding: 8px;
    }
    .login-bar .user-email { font-size: 0.8em; color: var(--primary); }
    .login-bar button {
      background: var(--primary); color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; cursor: pointer; font-weight: 600; font-size: 0.85em;
    }
    .login-bar button:hover { background: var(--primary-hover); }
    .login-bar .logout-btn { background: #c4b99a; color: var(--text); }
    .container {
      max-width: 1200px; margin: 0 auto; background: var(--bg-card);
      border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px 16px;
    }
    h1 { color: var(--primary); text-align: center; margin-bottom: 4px; font-size: 1.8em; }
    .site-logo { height: 64px; width: auto; display: block; margin: 0 auto 8px auto; }
    .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 16px; font-size: 0.9em; }

    /* Member Form (admin only) */
    .admin-panel {
      display: none; background: #f8f4ea; border-radius: 12px;
      padding: 16px; margin-bottom: 20px; border: 1px solid var(--border);
    }
    .admin-panel.visible { display: block; }
    .admin-panel h3 { color: var(--primary); margin-bottom: 12px; font-size: 1em; }
    .form-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .form-row input, .form-row select {
      flex: 1; min-width: 120px; padding: 8px 12px;
      background: #ffffff; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.9em;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,122,109,0.15); }
    .btn {
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 0.9em;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.danger:hover { background: #a93226; }
    .btn.secondary { background: #c4b99a; color: var(--text); }

    /* Members Table */
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    th {
      background: #ede5d5; color: var(--primary); padding: 10px 8px;
      text-align: left; border-bottom: 2px solid var(--accent); cursor: pointer;
    }
    th:hover { background: #ddd5c5; }
    td { padding: 8px; border-bottom: 1px solid #eee; }
    tr:hover { background: rgba(26,122,109,0.05); }

    .might-value { color: var(--primary); font-weight: 600; }
    .growth-positive { color: var(--success); }
    .growth-negative { color: var(--danger); }
    .member-actions { display: flex; gap: 4px; }
    .member-actions button {
      background: #ede5d5; color: var(--text); border: none; border-radius: 4px;
      padding: 4px 8px; cursor: pointer; font-size: 0.8em;
    }
    .member-actions button:hover { background: #ddd5c5; }
    .member-actions .remove-btn:hover { background: var(--danger); color: #fff; }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 3000;
      background: #fff; color: var(--text); padding: 12px 20px;
      border-radius: 8px; font-size: 0.9em; display: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    .member-count { text-align: center; color: var(--text-muted); font-size: 0.85em; margin-bottom: 12px; }

    .nav-links { display: flex; }
    .hamburger {
      display: none; background: none; border: none; cursor: pointer; padding: 8px;
      flex-direction: column; gap: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px; background: var(--primary); border-radius: 2px;
    }
    @media (max-width: 600px) {
      body { padding: 50px 4px 70px 4px; }
      .tab-nav { flex-wrap: wrap; padding: 0 8px; align-items: center; }
      .hamburger { display: flex; }
      .login-bar {
        position: static; flex: 1; justify-content: flex-end;
        padding: 4px 0; gap: 6px;
      }
      .nav-links { display: none; width: 100%; flex-direction: column; order: 10; }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 10px 12px; font-size: 0.9em; border-bottom: 1px solid var(--border); }
    }

    /* Tabs & Forms */
    .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
    .tab-btn-inner { padding: 8px 14px; background: none; border: none; color: var(--text-muted); font-size: 0.85em; font-weight: 600; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab-btn-inner:hover { color: var(--primary); }
    .tab-btn-inner.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .form-grid label { display: block; font-size: 0.75em; font-weight: 600; color: var(--primary); margin-bottom: 4px; text-transform: uppercase; }
    .form-grid input, .form-grid select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9em; background: #fff; color: var(--text); }
    .form-grid input:focus, .form-grid select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(91,58,143,0.15); }
    .form-grid .note { font-size: 0.7em; color: var(--text-muted); margin-top: 2px; }
    .status { margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 0.85em; min-height: 1.5em; }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.err { background: #ffebee; color: #c62828; }
    .troop-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: 700; min-width: 28px; text-align: center; }
    .troop-badge.g { background: #e8f5e9; color: #2e7d32; }
    .troop-badge.m { background: #e3f2fd; color: #1565c0; }
    .troop-badge.s { background: #fff3e0; color: #e65100; }
    .troop-badge.e { background: #f3e5f5; color: #7b1fa2; }
    .troop-badge.c { background: #fce4ec; color: #c62828; }
    .hero-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 700; }
  </style>
</head>
<body>

<nav class="tab-nav">
  <button class="hamburger" id="hamburgerBtn" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></button>
  <div class="login-bar" id="loginBar">
    <span class="user-email" id="userEmail" style="display:none"></span>
    <button id="loginBtn" onclick="handleLogin()">🔑 Login</button>
    <button id="logoutBtn" class="logout-btn" style="display:none" onclick="handleLogout()">Logout</button>
  </div>
  <div class="nav-links" id="navLinks">
    <a href="dashboard.html"><img src="chest.png" class="nav-icon" alt=""> Dashboard</a>
    <a href="events.html"><img src="events.png" class="nav-icon" alt=""> Events</a>
    <a href="members.html" class="active"><img src="members.png" class="nav-icon" alt=""> Members</a>
    <a href="calendar.html"><img src="calendar.png" class="nav-icon" alt=""> Calendar</a>
  </div>
</nav>

<div class="login-gate" id="loginGate" style="max-width:500px;margin:80px auto;text-align:center;background:var(--bg-card);border-radius:16px;padding:40px 24px;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
  <h2 style="color:var(--primary);margin-bottom:12px;">🔒 Login Required</h2>
  <p style="color:var(--text-muted);margin-bottom:20px;">You need to be logged in to view the Members page.</p>
  <button class="btn" onclick="handleLogin()" style="padding:12px 32px;font-size:1em;">🔑 Login</button>
</div>

<div class="container" id="mainContent" style="display:none">
  <img src="clo-sk6.png" alt="cCc League One SK6" class="site-logo">
  <h1>Members</h1>
  <p class="subtitle">Clan Roster</p>

  <!-- Admin Panel - Tabbed Interface -->
  <div class="admin-panel" id="adminPanel">
    <div class="tabs">
      <button class="tab-btn-inner active" onclick="switchTab('troopTab', this)">⚔️ Track Troops</button>
      <button class="tab-btn-inner" onclick="switchTab('heroTab', this)">🦸 Hero Level</button>
      <button class="tab-btn-inner" onclick="switchTab('addMemberTab', this)">➕ Add Member</button>
    </div>

    <div id="troopTab" class="tab-panel active">
      <h3 style="margin:0 0 10px;color:var(--primary)">Track Troop Levels</h3>
      <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
        <div><label>Member</label><select id="troopMemberSelect" onchange="loadMemberTroops()"></select></div>
        <div><label>Date</label><input type="date" id="troopDateInput"><div class="note">Defaults to today</div></div>
      </div>
      <div class="form-grid" style="grid-template-columns: repeat(5, 1fr);">
        <div><label>Guardsmen (G)</label><input type="number" id="troopG" min="3" max="9" placeholder="3-9"></div>
        <div><label>Specialists (S)</label><input type="number" id="troopS" min="3" max="9" placeholder="3-9"></div>
        <div><label>Monsters (M)</label><input type="number" id="troopM" min="3" max="9" placeholder="3-9"></div>
        <div><label>Eng. Corps (E)</label><input type="number" id="troopE" min="3" max="9" placeholder="3-9"></div>
        <div><label>Carter Lvl (C)</label><input type="number" id="troopC" min="1" max="500" placeholder="1-500"></div>
      </div>
      <div class="form-grid" style="grid-template-columns: 1fr;">
        <div><label>Notes (optional)</label><input type="text" id="troopNotesInput" placeholder="e.g. upgraded during event"></div>
      </div>
      <button class="btn" onclick="submitAllTroops()">💾 Save Changed Levels</button>
      <div id="troopStatus" class="status"></div>
    </div>

    <div id="heroTab" class="tab-panel">
      <h3 style="margin:0 0 10px;color:var(--primary)">Track Hero Level</h3>
      <div class="form-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div><label>Member</label><select id="heroMemberSelect"></select></div>
        <div><label>Hero Level</label><input type="number" id="heroLevelInput" placeholder="e.g. 350" min="0" onkeypress="if(event.key==='Enter') submitHeroLevel();"></div>
        <div><label>Date</label><input type="date" id="heroDateInput"><div class="note">Defaults to today</div></div>
      </div>
      <button class="btn" onclick="submitHeroLevel()">💾 Save Hero Level</button>
      <div id="heroStatus" class="status"></div>
    </div>

    <div id="addMemberTab" class="tab-panel">
      <h3 style="margin:0 0 10px;color:var(--primary)">Add New Member</h3>
      <div class="form-grid" style="grid-template-columns: repeat(2, 1fr);">
        <div><label>Player Name</label><input type="text" id="newMemberName" placeholder="Player Name"></div>
        <div><label>Join Date</label><input type="date" id="newMemberJoinDate"></div>
      </div>
      <button class="btn" onclick="addNewMember()">➕ Add Member</button>
      <div id="addMemberStatus" class="status"></div>
    </div>

  </div>

  <div class="member-count" id="memberCount"></div>

  <div class="loading" id="loadingDiv"><div class="spinner"></div><br>Loading members...</div>
  <div class="table-container" id="tableContainer" style="display:none">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('name')">Name</th>
          <th onclick="sortTable('joinDate')">Joined</th>
          <th onclick="sortTable('heroLevel')">Hero</th>
          <th onclick="sortTable('G')" title="Guardsmen">G</th>
          <th onclick="sortTable('M')" title="Monsters">M</th>
          <th onclick="sortTable('S')" title="Specialists">S</th>
          <th onclick="sortTable('E')" title="Engineer Corps">E</th>
          <th onclick="sortTable('C')" title="Carter Level">C</th>
          <th id="actionsHeader" style="display:none">Actions</th>
        </tr>
      </thead>
      <tbody id="membersTableBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let membersData = [];
  let troopData = {};   // { lowerName: { G: lvl, M: lvl, S: lvl, E: lvl, C: lvl } }
  let heroData = {};    // { lowerName: { level, timestamp } }
  let sortField = 'name';
  let sortAsc = true;
  let isLoggedIn = false;
  let currentUser = null;

  document.addEventListener('DOMContentLoaded', () => {
    setTodayDefaults();
    checkLoginState();
    if (isLoggedIn) {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      loadAllData();
    }
  });

  function setTodayDefaults() {
    const today = new Date().toISOString().split('T')[0];
    ['troopDateInput', 'heroDateInput', 'newMemberJoinDate'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = today;
    });
  }

  // AUTH (same pattern as dashboard)
  function checkLoginState() {
    const stored = localStorage.getItem('sk6_auth');
    if (stored) {
      try {
        const auth = JSON.parse(stored);
        if (auth.email && auth.allowed) {
          isLoggedIn = true;
          currentUser = auth;
          updateLoginUI();
        }
      } catch (e) {}
    }
  }

  function handleLogin() {
    if (!document.getElementById('gsi-script')) {
      const script = document.createElement('script');
      script.id = 'gsi-script';
      script.src = 'https://accounts.google.com/gsi/client';
      script.onload = () => initGoogleLogin();
      document.head.appendChild(script);
    } else { initGoogleLogin(); }
  }

  function initGoogleLogin() {
    google.accounts.id.initialize({ client_id: SITE_CONFIG.googleClientId, callback: handleGoogleCallback });
    google.accounts.id.prompt();
  }

  async function handleGoogleCallback(response) {
    try {
      const res = await fetch(window.GAS_WEB_APP_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: response.credential })
      });
      const data = await res.json();
      if (data.success && data.email) {
        const verifyRes = await fetch(window.GAS_WEB_APP_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'api', fn: 'verifyGoogleLogin', args: [{ email: data.email }] })
        });
        const verifyData = await verifyRes.json();
        const authResult = verifyData.data || verifyData;
        if (authResult.success && authResult.allowed) {
          isLoggedIn = true;
          currentUser = { email: data.email, allowed: true };
          localStorage.setItem('sk6_auth', JSON.stringify(currentUser));
          updateLoginUI();
          showToast('Logged in as ' + data.email, 'success');
        } else { showToast('Access denied', 'error'); }
      }
    } catch (err) { showToast('Login error', 'error'); }
  }

  function handleLogout() {
    isLoggedIn = false; currentUser = null;
    localStorage.removeItem('sk6_auth');
    window.location.href = 'dashboard.html';
  }

  function updateLoginUI() {
    document.getElementById('userEmail').textContent = isLoggedIn ? currentUser.email : '';
    document.getElementById('userEmail').style.display = isLoggedIn ? 'inline' : 'none';
    document.getElementById('loginBtn').style.display = isLoggedIn ? 'none' : 'inline';
    document.getElementById('logoutBtn').style.display = isLoggedIn ? 'inline' : 'none';
    document.getElementById('adminPanel').classList.toggle('visible', isLoggedIn);
    document.getElementById('actionsHeader').style.display = isLoggedIn ? '' : 'none';
    document.getElementById('loginGate').style.display = isLoggedIn ? 'none' : 'block';
    document.getElementById('mainContent').style.display = isLoggedIn ? 'block' : 'none';
    if (isLoggedIn && membersData.length === 0) loadAllData();
    if (membersData.length > 0) renderTable();
  }

  // LOAD ALL DATA (members + troops + hero levels)
  async function loadAllData() {
    try {
      const [members, troopSummary, heroLevels] = await Promise.all([
        callFunction('getMembersList'),
        callFunction('getAllTroopLevelsSummary').catch(() => null),
        callFunction('getHeroLevels').catch(() => null)
      ]);

      if (Array.isArray(members)) {
        membersData = members;
      }

      // Process troop data
      troopData = {};
      if (troopSummary && troopSummary.success && Array.isArray(troopSummary.data)) {
        troopSummary.data.forEach(entry => {
          const name = (entry.playerName || '').trim();
          if (name) troopData[name.toLowerCase()] = entry.currentLevels || {};
        });
      }

      // Process hero data
      heroData = {};
      if (heroLevels && heroLevels.success && Array.isArray(heroLevels.data)) {
        heroLevels.data.forEach(entry => {
          const name = (entry.playerName || '').trim();
          if (name) heroData[name.toLowerCase()] = { level: entry.level, timestamp: entry.timestamp };
        });
      }

      document.getElementById('memberCount').textContent = `${membersData.length} members`;
      populateSelects();
      renderTable();
      document.getElementById('loadingDiv').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'block';
    } catch (err) {
      console.error(err);
      document.getElementById('loadingDiv').innerHTML = '<span style="color:var(--danger)">Failed to load data</span>';
    }
  }

  function populateSelects() {
    const sorted = [...membersData].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    const options = '<option value="">-- Select member --</option>' +
      sorted.map(m => `<option value="${escapeHtml(m.name)}">${escapeHtml(m.name)}</option>`).join('');
    ['troopMemberSelect', 'heroMemberSelect'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = options;
    });
  }

  // RENDER TABLE
  function renderTable() {
    const tbody = document.getElementById('membersTableBody');
    tbody.innerHTML = '';

    const sorted = [...membersData].sort((a, b) => {
      let va, vb;
      const keyA = (a.name || '').toLowerCase();
      const keyB = (b.name || '').toLowerCase();
      const tA = troopData[keyA] || {};
      const tB = troopData[keyB] || {};
      const hA = heroData[keyA];
      const hB = heroData[keyB];

      switch (sortField) {
        case 'name': va = keyA; vb = keyB; break;
        case 'joinDate': va = a.joinDate || ''; vb = b.joinDate || ''; break;
        case 'heroLevel': va = hA ? hA.level : -1; vb = hB ? hB.level : -1; break;
        case 'G': case 'M': case 'S': case 'E': case 'C':
          va = tA[sortField] || 0; vb = tB[sortField] || 0; break;
        default: va = 0; vb = 0;
      }
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });

    sorted.forEach(m => {
      const key = (m.name || '').toLowerCase();
      const troops = troopData[key] || {};
      const hero = heroData[key];
      const tr = document.createElement('tr');

      const heroHtml = hero && hero.level != null
        ? `<span class="hero-badge" style="background:${getHeroBg(hero.level)};color:${getHeroFg(hero.level)}" title="Updated: ${hero.timestamp || '?'}">${hero.level}</span>`
        : '<span style="color:var(--text-muted)">—</span>';

      tr.innerHTML = `
        <td><strong>${escapeHtml(m.name)}</strong></td>
        <td>${escapeHtml(m.joinDate)}</td>
        <td style="text-align:center">${heroHtml}</td>
        <td style="text-align:center">${troopBadge('g', troops.G)}</td>
        <td style="text-align:center">${troopBadge('m', troops.M)}</td>
        <td style="text-align:center">${troopBadge('s', troops.S)}</td>
        <td style="text-align:center">${troopBadge('e', troops.E)}</td>
        <td style="text-align:center">${troopBadge('c', troops.C)}</td>
        ${isLoggedIn ? `<td class="member-actions">
          <button title="Edit troops" onclick="quickEditTroop('${escapeAttr(m.name)}')">&nbsp;⚔️&nbsp;</button>
          <button title="Edit hero" onclick="quickEditHero('${escapeAttr(m.name)}')">&nbsp;🦸&nbsp;</button>
          <button title="Rename" onclick="renameMember('${escapeAttr(m.name)}')">&nbsp;✏️&nbsp;</button>
          <button class="remove-btn" title="Remove" onclick="removeMember('${escapeAttr(m.name)}')">&nbsp;🗑️&nbsp;</button>
        </td>` : ''}
      `;
      tbody.appendChild(tr);
    });
  }

  function troopBadge(type, level) {
    if (!level) return '<span style="color:var(--text-muted)">—</span>';
    return `<span class="troop-badge ${type}">${level}</span>`;
  }

  function getHeroBg(lvl) {
    if (lvl > 500) return '#4a148c';
    if (lvl > 400) return '#0d47a1';
    if (lvl > 300) return '#1b5e20';
    if (lvl > 200) return '#fbc02d';
    if (lvl > 100) return '#37474f';
    return '#4e342e';
  }
  function getHeroFg(lvl) {
    if (lvl > 500) return '#e1bee7';
    if (lvl > 400) return '#bbdefb';
    if (lvl > 300) return '#c8e6c9';
    if (lvl > 200) return '#3e2723';
    if (lvl > 100) return '#eceff1';
    return '#d7ccc8';
  }

  // TROOP BULK FORM
  let loadedTroopLevels = {};
  function loadMemberTroops() {
    const name = document.getElementById('troopMemberSelect').value;
    const key = name ? name.toLowerCase() : '';
    const troops = troopData[key] || {};
    loadedTroopLevels = { ...troops };
    ['G', 'S', 'M', 'E', 'C'].forEach(t => {
      document.getElementById('troop' + t).value = troops[t] || '';
    });
  }
  function quickEditTroop(name) {
    document.getElementById('troopMemberSelect').value = name;
    switchTab('troopTab', document.querySelector('.tab-btn-inner'));
    loadMemberTroops();
    document.getElementById('troopG').focus();
  }
  function quickEditHero(name) {
    document.getElementById('heroMemberSelect').value = name;
    const btns = document.querySelectorAll('.tab-btn-inner');
    switchTab('heroTab', btns[1]);
    document.getElementById('heroLevelInput').focus();
  }

  function sortTable(field) {
    if (sortField === field) sortAsc = !sortAsc;
    else { sortField = field; sortAsc = true; }
    renderTable();
  }

  // TAB SWITCHING
  function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn-inner').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId)?.classList.add('active');
    if (btn) btn.classList.add('active');
  }

  // TROOP BULK ENTRY
  async function submitAllTroops() {
    const playerName = document.getElementById('troopMemberSelect').value;
    const date = document.getElementById('troopDateInput').value;
    const notes = document.getElementById('troopNotesInput').value.trim();
    const status = document.getElementById('troopStatus');
    status.textContent = ''; status.className = 'status';
    if (!playerName) { status.textContent = 'Please select a member.'; status.className = 'status err'; return; }
    const customTimestamp = date ? date + 'T12:00:00Z' : null;
    const types = ['G', 'S', 'M', 'E', 'C'];
    const changes = [];
    for (const t of types) {
      const raw = document.getElementById('troop' + t).value;
      if (raw === '') continue;
      const level = parseInt(raw, 10);
      const isC = t === 'C';
      if (isNaN(level) || (isC ? (level < 1 || level > 500) : (level < 3 || level > 9))) {
        status.textContent = `${t}: ${isC ? 'must be 1-500' : 'must be 3-9'}.`;
        status.className = 'status err'; return;
      }
      if (level !== (loadedTroopLevels[t] || 0)) changes.push({ type: t, level });
    }
    if (changes.length === 0) { status.textContent = 'No changes detected.'; status.className = 'status err'; return; }
    status.textContent = `Saving ${changes.length} change(s)...`;
    try {
      const results = await Promise.all(
        changes.map(c => callFunction('addTroopEntry', [playerName, c.type, c.level, notes, customTimestamp]))
      );
      const ok = results.filter(r => r && r.success).length;
      const fail = results.length - ok;
      const key = playerName.toLowerCase();
      if (!troopData[key]) troopData[key] = {};
      changes.forEach(c => { troopData[key][c.type] = c.level; });
      loadedTroopLevels = { ...troopData[key] };
      renderTable();
      status.textContent = fail ? `${ok} saved, ${fail} failed.` : `${ok} troop level(s) updated for ${playerName}.`;
      status.className = fail ? 'status err' : 'status ok';
      document.getElementById('troopNotesInput').value = '';
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
      status.className = 'status err';
    }
  }

  // HERO LEVEL ENTRY
  async function submitHeroLevel() {
    const playerName = document.getElementById('heroMemberSelect').value;
    const levelRaw = document.getElementById('heroLevelInput').value;
    const date = document.getElementById('heroDateInput').value;
    const status = document.getElementById('heroStatus');
    status.textContent = ''; status.className = 'status';

    if (!playerName) { status.textContent = 'Please select a member.'; status.className = 'status err'; return; }
    const level = parseInt(levelRaw, 10);
    if (isNaN(level) || level < 0) { status.textContent = 'Enter a valid hero level (0+).'; status.className = 'status err'; return; }

    status.textContent = 'Saving...';
    const customTimestamp = date ? date + 'T12:00:00Z' : null;
    try {
      const result = await callFunction('recordHeroLevel', [playerName, level, customTimestamp]);
      if (result && result.success) {
        status.textContent = result.message || `Hero level ${level} saved for ${playerName}.`;
        status.className = 'status ok';
        document.getElementById('heroLevelInput').value = '';
        heroData[playerName.toLowerCase()] = { level, timestamp: date || new Date().toISOString() };
        renderTable();
      } else {
        status.textContent = result?.message || 'Failed to save.';
        status.className = 'status err';
      }
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
      status.className = 'status err';
    }
  }

  // ADD MEMBER
  async function addNewMember() {
    const name = document.getElementById('newMemberName').value.trim();
    const joinDate = document.getElementById('newMemberJoinDate').value;
    const status = document.getElementById('addMemberStatus');
    status.textContent = ''; status.className = 'status';
    if (!name) { status.textContent = 'Name is required.'; status.className = 'status err'; return; }

    status.textContent = 'Adding...';
    try {
      const result = await callFunction('addMember', [name, joinDate, 0]);
      if (result && result.success) {
        status.textContent = result.message || `Added "${name}".`;
        status.className = 'status ok';
        document.getElementById('newMemberName').value = '';
        loadAllData();
      } else {
        status.textContent = result?.message || 'Failed to add member.';
        status.className = 'status err';
      }
    } catch (err) { status.textContent = 'Error: ' + err.message; status.className = 'status err'; }
  }

  // RENAME MEMBER (inline prompt)
  async function renameMember(oldName) {
    const newName = prompt(`New name for "${oldName}":`, oldName);
    if (!newName || newName === oldName) return;
    try {
      const result = await callFunction('updateMemberName', [oldName, newName]);
      showToast(result?.message || 'Done', result?.success ? 'success' : 'error');
      if (result?.success) {
        const member = membersData.find(m => m.name === oldName);
        if (member) member.name = newName;
        // Update troop/hero data keys
        const oldKey = oldName.toLowerCase();
        const newKey = newName.toLowerCase();
        if (troopData[oldKey]) { troopData[newKey] = troopData[oldKey]; delete troopData[oldKey]; }
        if (heroData[oldKey]) { heroData[newKey] = heroData[oldKey]; delete heroData[oldKey]; }
        populateSelects();
        renderTable();
      }
    } catch (err) { showToast('Error: ' + err.message, 'error'); }
  }

  // REMOVE MEMBER (inline confirm)
  async function removeMember(name) {
    if (!confirm(`Remove "${name}" and archive to Former Members?`)) return;
    try {
      const result = await callFunction('removeMember', [name]);
      showToast(result?.message || 'Done', result?.success ? 'success' : 'error');
      if (result?.success) {
        membersData = membersData.filter(m => m.name !== name);
        delete troopData[name.toLowerCase()];
        delete heroData[name.toLowerCase()];
        populateSelects();
        renderTable();
        document.getElementById('memberCount').textContent = `${membersData.length} members`;
      }
    } catch (err) { showToast('Error: ' + err.message, 'error'); }
  }

  // UTILITIES
  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function escapeAttr(str) {
    return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }
  function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + (type || '');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
